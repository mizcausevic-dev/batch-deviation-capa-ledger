<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
    <rect width="1400" height="860" fill="#070a0f"/>
    <rect x="28" y="28" width="1344" height="804" rx="30" fill="#0a1426" stroke="rgba(120,255,170,.18)"/>
    <rect x="58" y="58" width="1284" height="110" rx="24" fill="#0b1220" stroke="rgba(120,255,170,.12)"/>
    <text x="94" y="96" fill="#37ff8b" font-size="14" font-weight="700" font-family="Consolas, monospace">
<tspan x="94" dy="0">BATCH LANE</tspan>
</text>
    <text x="94" y="140" fill="#f5f7ff" font-size="38" font-weight="700" font-family="Georgia, serif">
<tspan x="94" dy="0">Batch Lane</tspan>
</text>
    <text x="94" y="188" fill="#b8c6db" font-size="18" font-weight="400" font-family="Inter,Segoe UI,Arial">
<tspan x="94" dy="0">Named ownership and next actions across deviation intake, root-cause evidence, CAPA</tspan>
<tspan x="94" dy="22">ownership, recurrence risk, and final disposition control families.</tspan>
</text>
    
    
    <rect x="58" y="206" width="620" height="250" rx="20" fill="#0b1220" stroke="rgba(120,255,170,.18)" />
    <text x="86" y="242" fill="#19c7ff" font-size="12" font-weight="700" font-family="Consolas, monospace">
<tspan x="86" dy="0">DEVIATION INTAKE LANE</tspan>
</text>
    <text x="86" y="288" fill="#f5f7ff" font-size="30" font-weight="700" font-family="Georgia, serif">
<tspan x="86" dy="0">Deviation intake</tspan>
<tspan x="86" dy="37">lane</tspan>
</text>
    <text x="86" y="338" fill="#b8c6db" font-size="16" font-weight="400" font-family="Inter,Segoe UI,Arial">
<tspan x="86" dy="0">Manufacturing QA owns packet</tspan>
<tspan x="86" dy="20">continuity, operator statements,</tspan>
<tspan x="86" dy="20">and event timestamps before CAPA</tspan>
<tspan x="86" dy="20">routing moves downstream.</tspan>
</text>
    
    
    <rect x="708" y="206" width="634" height="250" rx="20" fill="#0b1220" stroke="rgba(120,255,170,.18)" />
    <text x="736" y="242" fill="#ffcc66" font-size="12" font-weight="700" font-family="Consolas, monospace">
<tspan x="736" dy="0">ROOT-CAUSE LANE</tspan>
</text>
    <text x="736" y="288" fill="#f5f7ff" font-size="30" font-weight="700" font-family="Georgia, serif">
<tspan x="736" dy="0">Root-cause lane</tspan>
</text>
    <text x="736" y="338" fill="#b8c6db" font-size="16" font-weight="400" font-family="Inter,Segoe UI,Arial">
<tspan x="736" dy="0">Quality Systems keeps causality</tspan>
<tspan x="736" dy="20">notes, containment evidence, and</tspan>
<tspan x="736" dy="20">investigation freshness on one</tspan>
<tspan x="736" dy="20">lane.</tspan>
</text>
    
    
    <rect x="58" y="488" width="620" height="294" rx="20" fill="#0b1220" stroke="rgba(120,255,170,.18)" />
    <text x="86" y="524" fill="#b88cff" font-size="12" font-weight="700" font-family="Consolas, monospace">
<tspan x="86" dy="0">CAPA OWNERSHIP LANE</tspan>
</text>
    <text x="86" y="570" fill="#f5f7ff" font-size="30" font-weight="700" font-family="Georgia, serif">
<tspan x="86" dy="0">CAPA ownership lane</tspan>
</text>
    <text x="86" y="620" fill="#b8c6db" font-size="16" font-weight="400" font-family="Inter,Segoe UI,Arial">
<tspan x="86" dy="0">Supervisors see due dates, overdue</tspan>
<tspan x="86" dy="20">owners, retraining posture, and</tspan>
<tspan x="86" dy="20">effectiveness review timing in one</tspan>
<tspan x="86" dy="20">glance.</tspan>
</text>
    
    
    <rect x="708" y="488" width="634" height="294" rx="20" fill="#0b1220" stroke="rgba(120,255,170,.18)" />
    <text x="736" y="524" fill="#37ff8b" font-size="12" font-weight="700" font-family="Consolas, monospace">
<tspan x="736" dy="0">DISPOSITION LANE</tspan>
</text>
    <text x="736" y="570" fill="#f5f7ff" font-size="30" font-weight="700" font-family="Georgia, serif">
<tspan x="736" dy="0">Disposition lane</tspan>
</text>
    <text x="736" y="620" fill="#b8c6db" font-size="16" font-weight="400" font-family="Inter,Segoe UI,Arial">
<tspan x="736" dy="0">Synthetic packet IDs keep the</tspan>
<tspan x="736" dy="20">final story concrete: blocker,</tspan>
<tspan x="736" dy="20">owner, decision note, and next</tspan>
<tspan x="736" dy="20">checkpoint without overclaiming</tspan>
<tspan x="736" dy="20">compliance.</tspan>
</text>
    
    
    </svg>